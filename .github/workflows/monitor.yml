name: Appointment Monitor

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: appointment-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browsers
        run: python -m playwright install --with-deps chromium

      - name: Run appointment monitor
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DOCTOR_NAME: ${{ vars.DOCTOR_NAME }}
          APPOINTMENT_URL: ${{ vars.APPOINTMENT_URL }}
          SLOT_DAYS: ${{ vars.SLOT_DAYS }}
          RUN_ONCE: "true"
          DRY_RUN: "false"
          LOG_LEVEL: "INFO"
        run: python app.py

      - name: Persist notified slots
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/notified_slots.json
          git diff --cached --quiet || git commit -m "Update notified appointment slots [skip ci]"
          git push
